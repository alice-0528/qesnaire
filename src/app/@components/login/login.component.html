<h2 mat-dialog-title>Login {{data.name}}</h2>
<mat-dialog-content>
  <p>帳號：</p>
  <mat-form-field>
    <mat-label>Account</mat-label>
    <input matInput [(ngModel)]="account" />
  </mat-form-field>
  <br>
  <mat-form-field>
    <mat-label>Password</mat-label>
    <input type="password" matInput [(ngModel)]="password" />
  </mat-form-field>
</mat-dialog-content>
<mat-dialog-actions>
  <button mat-button (click)="onNoClick()">Cancel</button>
  <button mat-button [mat-dialog-close]="account()" [mat-dialog-close]="password()" cdkFocusInitial>Ok</button>
</mat-dialog-actions>
